<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw API Config Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #1a202c;
    }
    .subtitle {
      color: #718096;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #2d3748;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .results {
      margin-top: 32px;
      display: none;
    }
    .results.show {
      display: block;
    }
    .test-item {
      padding: 12px 16px;
      background: #f7fafc;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .test-item.success {
      background: #f0fdf4;
      border-left: 4px solid #22c55e;
    }
    .test-item.fail {
      background: #fef2f2;
      border-left: 4px solid #ef4444;
    }
    .config-output {
      margin-top: 24px;
      padding: 20px;
      background: #1a202c;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      position: relative;
    }
    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 12px;
      background: #4a5568;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      width: auto;
    }
    .copy-btn:hover {
      background: #2d3748;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #718096;
    }
    .spinner {
      border: 3px solid #e2e8f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 API Config Detector</h1>
    <p class="subtitle">自动检测 API 配置并生成 OpenClaw 配置</p>
    
    <form id="detectForm">
      <div class="input-group">
        <label for="baseUrl">Base URL</label>
        <input 
          type="text" 
          id="baseUrl" 
          placeholder="https://api.anthropic.com" 
          required
        >
      </div>
      
      <div class="input-group">
        <label for="apiKey">API Key</label>
        <input 
          type="password" 
          id="apiKey" 
          placeholder="sk-ant-xxx..." 
          required
        >
      </div>
      
      <button type="submit" id="detectBtn">开始检测</button>
    </form>
    
    <div class="results" id="results">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在测试配置...</p>
      </div>
      
      <div id="testResults" style="display: none;"></div>
      
      <div id="configOutput" style="display: none;">
        <h3 style="margin-bottom: 16px; color: #2d3748;">✅ 配置已生成</h3>
        <div class="config-output">
          <button class="copy-btn" onclick="copyConfig()">复制</button>
          <pre id="configJson"></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TEST_CONFIGS = [
      {
        api: 'anthropic-messages',
        path: '/v1/messages',
        method: 'POST',
        headers: (key) => ({
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json'
        }),
        body: {
          model: 'claude-3-5-sonnet-20241022',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'hi' }]
        }
      },
      {
        api: 'openai-completions',
        path: '/v1/chat/completions',
        method: 'POST',
        headers: (key) => ({
          'authorization': `Bearer ${key}`,
          'content-type': 'application/json'
        }),
        body: {
          model: 'gpt-4',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'hi' }]
        }
      },
      {
        api: 'openai-completions (no auth)',
        path: '/v1/chat/completions',
        method: 'POST',
        headers: () => ({
          'content-type': 'application/json'
        }),
        body: {
          model: 'gpt-4',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'hi' }]
        },
        authHeader: false
      },
      {
        api: 'openai-responses',
        path: '/v1/chat/completions',
        method: 'POST',
        headers: (key) => ({
          'authorization': `Bearer ${key}`,
          'content-type': 'application/json'
        }),
        body: {
          model: 'gpt-4',
          max_tokens: 10,
          stream: false,
          messages: [{ role: 'user', content: 'hi' }]
        }
      }
    ]

    async function testConfig(baseUrl, apiKey, config) {
      try {
        const url = new URL(config.path, baseUrl)
        const headers = typeof config.headers === 'function' 
          ? config.headers(apiKey) 
          : config.headers

        const response = await fetch(url.toString(), {
          method: config.method,
          headers: headers,
          body: JSON.stringify(config.body)
        })

        return {
          success: response.ok,
          statusCode: response.status,
          api: config.api,
          authHeader: config.authHeader
        }
      } catch (error) {
        return {
          success: false,
          api: config.api,
          authHeader: config.authHeader,
          error: error.message
        }
      }
    }

    document.getElementById('detectForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      
      const baseUrl = document.getElementById('baseUrl').value.trim()
      const apiKey = document.getElementById('apiKey').value.trim()
      
      const results = document.getElementById('results')
      const loading = document.getElementById('loading')
      const testResults = document.getElementById('testResults')
      const configOutput = document.getElementById('configOutput')
      const detectBtn = document.getElementById('detectBtn')
      
      results.classList.add('show')
      loading.style.display = 'block'
      testResults.style.display = 'none'
      configOutput.style.display = 'none'
      detectBtn.disabled = true
      
      const testResultsHtml = []
      const allResults = []
      
      for (const config of TEST_CONFIGS) {
        const result = await testConfig(baseUrl, apiKey, config)
        allResults.push(result)
        
        const statusClass = result.success ? 'success' : 'fail'
        const statusIcon = result.success ? '✅' : '❌'
        const statusText = result.success 
          ? 'Success' 
          : `Failed (${result.error || result.statusCode})`
        
        testResultsHtml.push(`
          <div class="test-item ${statusClass}">
            <span>${config.api}</span>
            <span>${statusIcon} ${statusText}</span>
          </div>
        `)
      }
      
      loading.style.display = 'none'
      testResults.innerHTML = testResultsHtml.join('')
      testResults.style.display = 'block'
      
      const working = allResults.filter(r => r.success)
      
      if (working.length > 0) {
        const best = working[0]
        const apiType = best.api.split(' ')[0]
        
        const config = {
          baseUrl: baseUrl,
          apiKey: apiKey,
          api: apiType
        }
        
        if (best.authHeader === false) {
          config.authHeader = false
        }
        
        const models = apiType.includes('anthropic')
          ? [
              { id: 'claude-opus-4-6', name: 'Claude Opus 4.6', reasoning: false, input: ['text', 'image'], contextWindow: 200000, maxTokens: 8192 },
              { id: 'claude-sonnet-4-6', name: 'Claude Sonnet 4.6', reasoning: false, input: ['text', 'image'], contextWindow: 200000, maxTokens: 8192 }
            ]
          : [
              { id: 'gpt-5.2', name: 'GPT-5.2', reasoning: false, input: ['text', 'image'], contextWindow: 128000, maxTokens: 16384 },
              { id: 'gpt-4', name: 'GPT-4', reasoning: false, input: ['text'], contextWindow: 128000, maxTokens: 4096 }
            ]
        
        const finalConfig = {
          models: {
            providers: {
              'custom-provider': {
                ...config,
                models: models
              }
            }
          }
        }
        
        document.getElementById('configJson').textContent = JSON.stringify(finalConfig, null, 2)
        configOutput.style.display = 'block'
      }
      
      detectBtn.disabled = false
    })

    function copyConfig() {
      const text = document.getElementById('configJson').textContent
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn')
        const originalText = btn.textContent
        btn.textContent = '已复制!'
        setTimeout(() => {
          btn.textContent = originalText
        }, 2000)
      })
    }
  </script>
</body>
</html>
