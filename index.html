<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw API Config Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 700px;
      width: 100%;
      padding: 40px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #1a202c;
    }
    .subtitle {
      color: #718096;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #2d3748;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
      font-family: 'Monaco', monospace;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .results {
      margin-top: 32px;
      display: none;
    }
    .results.show { display: block; }
    .test-item {
      padding: 12px 16px;
      background: #f7fafc;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .test-item.success {
      background: #f0fdf4;
      border-left: 4px solid #22c55e;
    }
    .test-item.fail {
      background: #fef2f2;
      border-left: 4px solid #ef4444;
    }
    .config-output {
      margin-top: 24px;
      padding: 20px;
      background: #1a202c;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
      overflow-x: auto;
      position: relative;
      max-height: 500px;
      overflow-y: auto;
    }
    .copy-btn {
      position: sticky;
      top: 12px;
      float: right;
      padding: 6px 12px;
      background: #4a5568;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      width: auto;
      z-index: 10;
    }
    .copy-btn:hover {
      background: #2d3748;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #718096;
    }
    .spinner {
      border: 3px solid #e2e8f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .note {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-top: 16px;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 OpenClaw API Detector</h1>
    <p class="subtitle">自动检测 API 配置并生成 OpenClaw 配置（完全对齐 OpenClaw 源码逻辑）</p>
    
    <form id="detectForm">
      <div class="input-group">
        <label for="providerName">Provider Name（自定义名称，如 my-provider）</label>
        <input 
          type="text" 
          id="providerName" 
          placeholder="my-provider" 
          required
        >
      </div>

      <div class="input-group">
        <label for="baseUrl">Base URL</label>
        <input 
          type="text" 
          id="baseUrl" 
          placeholder="https://api.anthropic.com" 
          required
        >
      </div>
      
      <div class="input-group">
        <label for="apiKey">API Key</label>
        <input 
          type="password" 
          id="apiKey" 
          placeholder="sk-ant-xxx..." 
          required
        >
      </div>

      <div class="input-group">
        <label for="testModel">Test Model</label>
        <input 
          type="text" 
          id="testModel" 
          placeholder="claude-sonnet-4-6 或 gpt-4"
          required
        >
      </div>
      
      <button type="submit" id="detectBtn">开始检测</button>
    </form>
    
    <div class="results" id="results">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在测试所有 API 配置组合...</p>
      </div>
      
      <div id="testResults" style="display: none;"></div>
      
      <div id="configOutput" style="display: none;">
        <h3 style="margin-bottom: 16px; color: #2d3748;">✅ 配置已生成</h3>
        <div class="note">
          复制下面的配置，粘贴到 <code>openclaw.json</code> 的 <code>models.providers</code> 中
        </div>
        <div class="config-output">
          <button class="copy-btn" onclick="copyConfig()">复制</button>
          <pre id="configJson"></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    // localStorage 保存和恢复
    window.addEventListener('DOMContentLoaded', () => {
      const fields = ['providerName', 'baseUrl', 'apiKey', 'testModel']
      fields.forEach(field => {
        const saved = localStorage.getItem(field)
        if (saved) {
          document.getElementById(field).value = saved
        }
      })
    })

    function saveToLocalStorage() {
      const fields = ['providerName', 'baseUrl', 'apiKey', 'testModel']
      fields.forEach(field => {
        const value = document.getElementById(field).value
        if (value) {
          localStorage.setItem(field, value)
        }
      })
    }

    // 完全对齐 OpenClaw 的 API 类型定义
    const TEST_CONFIGS = [
      {
        name: 'anthropic-messages (/v1/messages)',
        api: 'anthropic-messages',
        path: '/v1/messages',
        method: 'POST',
        headers: (key) => ({
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json'
        }),
        bodyTemplate: (model) => ({
          model: model || 'claude-3-5-sonnet-20241022',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'hi' }]
        }),
        defaultModels: ['claude-3-5-sonnet-20241022', 'claude-opus-4-6', 'claude-sonnet-4-6'],
        suggestedModels: [
          {
            id: 'claude-opus-4-6',
            name: 'Claude Opus 4.6',
            reasoning: false,
            input: ['text', 'image'],
            cost: { input: 15, output: 75, cacheRead: 1.5, cacheWrite: 18.75 },
            contextWindow: 200000,
            maxTokens: 8192
          },
          {
            id: 'claude-sonnet-4-6',
            name: 'Claude Sonnet 4.6',
            reasoning: false,
            input: ['text', 'image'],
            cost: { input: 3, output: 15, cacheRead: 0.3, cacheWrite: 3.75 },
            contextWindow: 200000,
            maxTokens: 8192
          }
        ]
      },
      {
        name: 'openai-completions (Bearer)',
        api: 'openai-completions',
        path: '/v1/chat/completions',
        method: 'POST',
        headers: (key) => ({
          'authorization': `Bearer ${key}`,
          'content-type': 'application/json'
        }),
        bodyTemplate: (model) => ({
          model: model || 'gpt-4',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'hi' }]
        }),
        defaultModels: ['gpt-4', 'gpt-5.2', 'gpt-4o'],
        authHeader: true,
        suggestedModels: [
          {
            id: 'gpt-5.2',
            name: 'GPT-5.2',
            reasoning: false,
            input: ['text', 'image'],
            cost: { input: 2.5, output: 10, cacheRead: 1.25, cacheWrite: 3.125 },
            contextWindow: 128000,
            maxTokens: 16384
          },
          {
            id: 'gpt-4',
            name: 'GPT-4',
            reasoning: false,
            input: ['text'],
            cost: { input: 30, output: 60, cacheRead: 0, cacheWrite: 0 },
            contextWindow: 128000,
            maxTokens: 4096
          }
        ]
      },
      {
        name: 'openai-completions (no auth header)',
        api: 'openai-completions',
        path: '/v1/chat/completions',
        method: 'POST',
        headers: () => ({
          'content-type': 'application/json'
        }),
        bodyTemplate: (model) => ({
          model: model || 'gpt-4',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'hi' }]
        }),
        defaultModels: ['gpt-4', 'gpt-5.2'],
        authHeader: false,
        suggestedModels: [
          {
            id: 'gpt-5.2',
            name: 'GPT-5.2',
            reasoning: false,
            input: ['text', 'image'],
            cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
            contextWindow: 128000,
            maxTokens: 16384
          }
        ]
      },
      {
        name: 'openai-responses',
        api: 'openai-responses',
        path: '/v1/chat/completions',
        method: 'POST',
        headers: (key) => ({
          'authorization': `Bearer ${key}`,
          'content-type': 'application/json'
        }),
        bodyTemplate: (model) => ({
          model: model || 'gpt-4',
          max_tokens: 10,
          stream: false,
          messages: [{ role: 'user', content: 'hi' }]
        }),
        defaultModels: ['gpt-5.1-codex', 'gpt-4'],
        authHeader: true,
        suggestedModels: [
          {
            id: 'gpt-5.1-codex',
            name: 'GPT-5.1 Codex',
            reasoning: true,
            input: ['text'],
            cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
            contextWindow: 200000,
            maxTokens: 8192
          }
        ]
      },
      // 路径变体：不带 /v1 前缀
      {
        name: 'anthropic-messages (/messages)',
        api: 'anthropic-messages',
        path: '/messages',
        method: 'POST',
        headers: (key) => ({
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json'
        }),
        bodyTemplate: (model) => ({
          model: model || 'claude-3-5-sonnet-20241022',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'hi' }]
        }),
        defaultModels: ['claude-3-5-sonnet-20241022', 'claude-opus-4-6'],
        suggestedModels: [
          {
            id: 'claude-opus-4-6',
            name: 'Claude Opus 4.6',
            reasoning: false,
            input: ['text', 'image'],
            cost: { input: 15, output: 75, cacheRead: 1.5, cacheWrite: 18.75 },
            contextWindow: 200000,
            maxTokens: 8192
          }
        ]
      },
      {
        name: 'openai-completions (/chat/completions)',
        api: 'openai-completions',
        path: '/chat/completions',
        method: 'POST',
        headers: (key) => ({
          'authorization': `Bearer ${key}`,
          'content-type': 'application/json'
        }),
        bodyTemplate: (model) => ({
          model: model || 'gpt-4',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'hi' }]
        }),
        defaultModels: ['gpt-4', 'gpt-5.2'],
        authHeader: true,
        suggestedModels: [
          {
            id: 'gpt-4',
            name: 'GPT-4',
            reasoning: false,
            input: ['text'],
            cost: { input: 30, output: 60, cacheRead: 0, cacheWrite: 0 },
            contextWindow: 128000,
            maxTokens: 4096
          }
        ]
      }
    ]

    async function testConfig(baseUrl, apiKey, config, testModel) {
      const headers = typeof config.headers === 'function' 
        ? config.headers(apiKey) 
        : config.headers

      const modelsToTry = testModel ? [testModel] : config.defaultModels
      
      let lastError = null
      for (const model of modelsToTry) {
        try {
          const body = config.bodyTemplate(model)
          
          // 调用服务端 API 避免 CORS
          const response = await fetch('/api/test', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              baseUrl,
              apiKey,
              api: config.api,
              path: config.path,
              headers,
              body
            })
          })

          const result = await response.json()
          
          if (result.success) {
            return {
              success: true,
              statusCode: result.statusCode,
              api: config.api,
              name: config.name,
              authHeader: config.authHeader,
              suggestedModels: config.suggestedModels,
              testedModel: model
            }
          }
          lastError = result.error || `${result.statusCode}`
        } catch (err) {
          lastError = err.message
        }
      }
      
      return {
        success: false,
        api: config.api,
        name: config.name,
        authHeader: config.authHeader,
        error: lastError
      }
    }

    document.getElementById('detectForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      
      saveToLocalStorage()
      
      const providerName = document.getElementById('providerName').value.trim()
      const baseUrl = document.getElementById('baseUrl').value.trim()
      const apiKey = document.getElementById('apiKey').value.trim()
      const testModel = document.getElementById('testModel').value.trim()
      
      const results = document.getElementById('results')
      const loading = document.getElementById('loading')
      const testResults = document.getElementById('testResults')
      const configOutput = document.getElementById('configOutput')
      const detectBtn = document.getElementById('detectBtn')
      
      results.classList.add('show')
      loading.style.display = 'block'
      testResults.style.display = 'none'
      configOutput.style.display = 'none'
      detectBtn.disabled = true
      
      const testResultsHtml = []
      const allResults = []
      
      for (const config of TEST_CONFIGS) {
        const result = await testConfig(baseUrl, apiKey, config, testModel)
        allResults.push(result)
        
        const statusClass = result.success ? 'success' : 'fail'
        const statusIcon = result.success ? '✅' : '❌'
        const statusText = result.success 
          ? `${result.statusCode}` 
          : `${result.statusCode || 'Error'}: ${result.error || 'Failed'}`
        
        testResultsHtml.push(`
          <div class="test-item ${statusClass}">
            <span><strong>${config.name}</strong></span>
            <span>${statusIcon} ${statusText}</span>
          </div>
        `)
      }
      
      loading.style.display = 'none'
      testResults.innerHTML = testResultsHtml.join('')
      testResults.style.display = 'block'
      
      const working = allResults.filter(r => r.success)
      
      if (working.length > 0) {
        const best = working[0]
        
        // 完全对齐 OpenClaw 的配置格式
        const providerConfig = {
          baseUrl: baseUrl,
          apiKey: apiKey,
          api: best.api,
          models: best.suggestedModels
        }
        
        // authHeader 只在为 false 时才写入（对齐 OpenClaw 默认行为）
        if (best.authHeader === false) {
          providerConfig.authHeader = false
        }
        
        const finalConfig = {
          [providerName]: providerConfig
        }
        
        document.getElementById('configJson').textContent = JSON.stringify(finalConfig, null, 2)
        configOutput.style.display = 'block'
      } else {
        testResults.innerHTML += '<div class="note" style="background: #fee2e2; border-color: #ef4444; color: #991b1b;">❌ 所有配置都失败了。请检查 baseUrl 和 apiKey 是否正确。</div>'
      }
      
      detectBtn.disabled = false
    })

    function copyConfig() {
      const text = document.getElementById('configJson').textContent
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn')
        const originalText = btn.textContent
        btn.textContent = '✓ 已复制'
        setTimeout(() => {
          btn.textContent = originalText
        }, 2000)
      })
    }
  </script>
</body>
</html>
